;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_
;; COLORS
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[const]

mod-pad = 1

[color]

; Active Shade
shade1 = ${xrdb:color1:#2E3440}
shade2 = ${xrdb:color2:#434C5E}
shade3 = ${xrdb:color3:#5E81AC}
shade4 = ${xrdb:color4:#BF616A}
shade5 = ${xrdb:color5:#D08770}
shade6 = ${xrdb:color6:#B48EAD}
shade7 = ${xrdb:color7:#EBCB8B}
shade8 = ${xrdb:color8:#88C0D0}

;; Active Colorss
bground = ${xrdb:color0:#2E3440}
fground = ${xrdb:color1:#ECEFF4}
;borderbg = #f7f7f7
accent = ${xrdb:color15:#c6c9d1}
modulefg = ${xrdb:color0:#c6c9d1}
modulefg-alt = ${xrdb:color8:#c6c9d1}

;; Other
trans = #00000000

;; Material Colors
red = ${xrdb:color1:#e53935}
yellow = ${xrdb:color3:#fdd835}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_
;; BAR
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[global/wm]

margin-bottom = 0
margin-top = 0

[bar/primary]

wm-restack = bspwm
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

;width = 100%
;height = 22
;offset-x = 1%
;offset-y = 2%
width = 100%
height = 17
offset-x = 0%
offset-y = 0%

mpdmaxlen = 40
titlemaxlen = 35

background = ${color.bground}
foreground = ${color.fground}

radius-top = 0.0
radius-bottom = 0.0

overline-size = 2
overline-color = ${color.accent}

;border-bottom-size = 2
;border-color = ${color.borderbg}

padding = 0
module-margin-left = 0
module-margin-right = 0

font-0 = "Fira Code:size=8;2"
font-1 = "PowerlineSymbols:style=Medium:size=12;3"
; font-2 = "Font Awesome 5 Free:style=solid:size=10;2"
font-2 = "feather:size=10;3"
font-3 = "Font Awesome 5 Free:style=regular:size=10;2"
font-4 = "Font Awesome 5 Free:style=brands:size=10;2"
font-5 = "Iosevka Nerd Font:style=Medium:size=10;3"

modules-left = left1 term left2 workspaces left3 title left4
; modules-left = term workspaces title 
modules-center = mpd 
modules-right =  right8 cpu right7 memory right6 alsa right5 battery right4 backlight right3 network networkspeeddown right2 date right1 updates 

separator =
spacing = 0
dim-value = 1.0
wm-name =
locale =

tray-position = left
tray-detached = false
tray-maxsize = 16
tray-transparent = false
tray-background = ${color.shade1}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0

enable-ipc = true

[bar/secondary]

wm-restack = bspwm
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

;width = 100%
;height = 22
;offset-x = 1%
;offset-y = 2%
width = 100%
height = 21
offset-x = 0%
offset-y = 0%

mpdmaxlen = 36
titlemaxlen = 30

background = ${color.bground}
foreground = ${color.fground}

radius-top = 0.0
radius-bottom = 0.0

overline-size = 2
overline-color = ${color.accent}

;border-bottom-size = 2
;border-color = ${color.borderbg}

padding = 0
module-margin-left = 0
module-margin-right = 0

font-0 = "Fira Code:size=10;2"
font-1 = "PowerlineSymbols:style=Medium:size=15;3"
; font-1 = "Font Awesome 5 Free:style=solid:size=13;2"
font-2 = "feather:size=12;3"
font-3 = "Font Awesome 5 Free:style=regular:size=13;2"
font-4 = "Font Awesome 5 Free:style=brands:size=13;2"
font-5 = "Iosevka Nerd Font:style=Medium:size=11;3"

modules-left = left1 launcher left2 workspaces left3 title left4
modules-center = mpd
modules-right = right8 cpu right7 memory right6 alsa right5 battery right4 backlight right3 network networkspeeddown right2 date right1 updates

separator =
spacing = 0
dim-value = 1.0
wm-name =
locale =

tray-position = left
tray-detached = false
tray-maxsize = 16
tray-transparent = false
tray-background = ${color.shade1}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0

enable-ipc = true

[settings]

throttle-output = 5
throttle-output-for = 10
throttle-input-for = 30

screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = false

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_
;; MODULES
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/left1]
type = custom/text
content-background = ${color.shade2}
content-foreground = ${color.shade1}
content = "%{T3}%{T-}"

[module/left2]
type = custom/text
content-background = ${color.shade7}
content-foreground = ${color.shade2}
content = "%{T3}%{T-}"

[module/left3]
type = custom/text
content-background = ${color.shade4}
content-foreground = ${color.shade7}
content = "%{T3}%{T-}"


[module/left4]
type = custom/text
content-background = ${color.bground}
content-foreground = ${color.shade4}
content = "%{T3}%{T-}"
#+++++++++++++++++++++++++++++++++++++++

[module/right1]
type = custom/text
content-background = ${color.shade2}
content-foreground = ${color.shade1}
content = "%{T3}%{T-}"

[module/right2]
type = custom/text
content-background = ${color.shade3}
content-foreground = ${color.shade2}
content = "%{T3}%{T-}"

[module/right3]
type = custom/text
content-background = ${color.shade4}
content-foreground = ${color.shade3}
content = "%{T3}%{T-}"

[module/right4]
type = custom/text
content-background = ${color.shade5}
content-foreground = ${color.shade4}
content = "%{T3}%{T-}"

[module/right5]
type = custom/text
content-background = ${color.shade6}
content-foreground = ${color.shade5}
content = "%{T3}%{T-}"

[module/right6]
type = custom/text
content-background = ${color.shade7}
content-foreground = ${color.shade6}
content = "%{T3}%{T-}"

[module/right7]
type = custom/text
content-background = ${color.shade8}
content-foreground = ${color.shade7}
content = "%{T3}%{T-}"

[module/right8]
type = custom/text
content-background = ${color.bground}
content-foreground = ${color.shade8}
content = "%{T3}%{T-}"
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/launcher]
type = custom/text
content = 

content-background = ${color.shade2}
content-foreground = ${color.modulefg}
content-padding = 1

click-left =  rofi -show run -theme ${env:HOME}/.cache/wal/colors-rofi-dark.rasi -font "Fira Code 10"
click-right =  rofi -show drun -theme ${env:HOME}/.cache/wal/colors-rofi-light.rasi -font "Fira Code 10"

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/title]
type = internal/xwindow

format = <label>
format-background = ${color.shade4}
format-foreground = ${color.modulefg}
format-padding = ${const.mod-pad}

label =  %title%
label-maxlen = ${root.titlemaxlen}

label-empty =  Empty
label-empty-foreground = ${color.modulefg}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/workspaces]
type = internal/xworkspaces

pin-workspaces = false
enable-click = true
enable-scroll = true


icon-0 = 1;
icon-1 = 2;
icon-2 = 3;
icon-3 = 4;
icon-4 = 5;
icon-5 = 6;6
icon-6 = 7;7

label-active = 
label-occupied = 
label-urgent = 
label-empty = 

format = <label-state>

label-monitor = %name%
label-active-foreground = ${color.bground}
label-occupied-foreground = ${color.shade4}
label-urgent-foreground = ${color.red}
label-empty-foreground = ${color.shade5}
format-background = ${color.shade7}
format-foreground = ${color.modulefg}

label-active-padding = 1
label-urgent-padding = 1
label-occupied-padding = 1
label-empty-padding = 1

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/alsa]
type = internal/alsa

format-volume =  <label-volume>
format-volume-background = ${color.shade6}
format-volume-foreground = ${color.bground}
format-volume-padding = 1

label-volume = %percentage%%

format-muted-prefix =
label-muted = ""
format-muted-background = ${color.shade6}
format-muted-foreground = ${color.modulefg}
format-muted-padding = 1

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-3 = 
ramp-volume-4 = 

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/backlight]
type = internal/backlight

card = ${env:BACKLIGHT_CARD:intel_backlight}

format = <ramp> <label>
format-background = ${color.shade4}
format-foreground = ${color.modulefg}
format-padding = ${const.mod-pad}
enable-scroll = true

label = %percentage%%

ramp-0 = 🌕
ramp-1 = 🌔
ramp-2 = 🌓
ramp-3 = 🌒
ramp-4 = 🌑

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_
[module/memory]
type = internal/memory
interval = 1
format-prefix-foreground = ${colors.foreground-alt}
label =  %gb_used%
format-background = ${color.shade7}
format-foreground = ${color.bground}
format-padding = ${const.mod-pad}

[module/battery]
type = internal/battery

full-at = 99

battery = ${env:BATTERY:BAT0}
adapter = ${env:ADAPTER:ACAD}

poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging> <label-charging>
format-charging-background = ${color.shade5}
format-charging-foreground = ${color.bground}
format-charging-padding = 1

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${color.shade5}
format-discharging-foreground = ${color.bground}
format-discharging-padding = 1

label-charging = %percentage%%
label-discharging = %percentage%%

label-full = Fully Charged
label-full-background = ${color.shade5}
label-full-foreground = ${color.modulefg}
label-full-padding = 1

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
nimation-charging-framerate = 750

[module/cpu]
type = internal/cpu

; Seconds to sleep between updates
; Default: 1
interval = 1

; Available tags:
;   <label> (default)
;   <bar-load>
;   <ramp-load>
;   <ramp-coreload>
;;format = <label> <ramp-coreload>
format = <label>
format-prefix = 
format-foreground = ${color.bground}
format-background = ${color.shade8}
format-padding = ${const.mod-pad}

; Available tokens:
;   %percentage% (default) - total cpu load averaged over all cores
;   %percentage-sum% - Cumulative load on all cores
;   %percentage-cores% - load percentage for each core
;   %percentage-core[1-9]% - load percentage for specific core
label = " %percentage%%"

; Spacing between individual per-core ramps
;;ramp-coreload-spacing = 1
;;ramp-coreload-0 = ${cpu.load0}
;;ramp-coreload-1 = ${cpu.load1}

;;ramp-load-0 = ${cpu.load0}
;;ramp-load-1 = ${cpu.load1}
;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/date]
type = internal/date
interval = 1.0

time = %H:%M
time-alt = %d/%m/%Y%

format = %{A3:cald &:}<label>%{A}
format-background = ${color.shade2}
format-foreground = ${color.modulefg}
format-padding = ${const.mod-pad}
label = %time%

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/powermenu]
type = custom/menu

expand-right = true

menu-0-0 = 
menu-0-0-exec = menu-open-1
menu-0-1 = 
menu-0-1-exec = menu-open-2
menu-0-2 = 
menu-0-2-exec = menu-open-3
menu-0-3 = 
menu-0-3-exec = menu-open-4

menu-1-0 = 
menu-1-0-exec = systemctl reboot
menu-1-1 = 
menu-1-1-exec = menu-open-0

menu-2-0 = 
menu-2-0-exec = systemctl poweroff
menu-2-1 = 
menu-2-1-exec = menu-open-0

menu-3-0 = 
menu-3-0-exec = i3lock-fancy
menu-3-1 = 
menu-3-1-exec = menu-open-0

menu-4-0 = 
menu-4-0-exec = i3-msg exit
menu-4-1 = 
menu-4-1-exec = menu-open-0

format-spacing = 1
format-background = ${color.shade1}
format-foreground = ${color.modulefg}
format-padding = ${const.mod-pad}

label-open = 
label-close = 
label-separator = |

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/network]
type = internal/network
interface = ${env:WIRELESS_INTERFACE:wlp2s0}

interval = 1.0
accumulate-stats = true
unknown-as-up = true

format-connected =  <label-connected>
format-connected-background = ${color.shade3}
format-connected-foreground = ${color.modulefg}
format-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-background = ${color.shade3}
format-disconnected-foreground = ${color.modulefg}
format-disconnected-padding = 1

label-connected = "%{A1:networkmanager_dmenu &:}%essid%%{A}"
label-disconnected =  "Not Connected"
ramp-signal-0 =  
ramp-signal-1 = 
ramp-signal-2 = 
ramp-signal-3 = 
ramp-signal-4 = 

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/networkspeedup]
;https://github.com/jaagr/polybar/wiki/Module:-network
type = internal/network
interface = ${env:WIRELESS_INTERFACE:wlp2s0}
label-connected = %{A1:$TERMA -e sh -c "nmcli device wifi list;$SHELL" &:}%upspeed:7%%{A}
format-connected = <label-connected>
format-connected-prefix = " "
format-connected-prefix-foreground = ${color.modulefg}
format-connected-foreground = ${color.modulefg}
format-connected-background = ${color.shade3}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/networkspeeddown]
;https://github.com/jaagr/polybar/wiki/Module:-network
type = internal/network
interface = ${env:WIRELESS_INTERFACE:wlp2s0}
label-connected = %{A1:$TERMA -e sh -c "sudo nethogs" &:}%downspeed:7%%{A}
format-connected = <label-connected>
format-connected-prefix = ""
format-connected-prefix-foreground = ${color.modulefg}
format-connected-foreground = ${color.modulefg}
format-connected-background = ${color.shade3}

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/updates]
type = custom/script
exec = ~/.config/polybar/scripts/updates.sh
interval = 180
label = %output%
format-foreground = ${color.modulefg}
format-background = ${color.shade1}
format-prefix = " "
format-prefix-foreground = ${color.shade7}
label-urgent-padding    = 0

click-left = $TERMB -e sh -c "apt list --upgradable;$SHELL" &

;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_

[module/term]
type = custom/text

; Label
content            = 
content-background = ${color.shade2}
content-foreground = ${color.modulefg}
content-padding    = 1

; Mouse click
click-left = $TERMA

[module/mpd]
type = internal/mpd
format-online = %{A1:kunst_handler &:}%{A3:mpc toggle:}<label-song>%{A}%{A} 
format-online-foreground = ${color.shade4}

icon-prev =  
icon-stop = 
icon-play = 
icon-pause = 
icon-next = 

label-song = %title% - %artist%
label-song-maxlen = ${root.mpdmaxlen}
label-song-ellipsis = true
